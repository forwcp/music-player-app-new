name: music_player_app
description: "A modern local music player with DLNA & Bluetooth casting."
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  just_audio: ^0.10.5
  path_provider: ^2.1.5
  permission_handler: ^12.0.3
  mime: ^2.0.0
  provider: ^6.1.5+1
  dlna_dart: ^0.0.8
  http: ^1.6.0
  flutter_blue_plus: ^2.3.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
